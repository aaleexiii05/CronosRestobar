services:
  - type: web
    name: cronos-mysql
    runtime: docker
    dockerfilePath: Dockerfile
    rootDir: mysql
    plan: free
    envVars:
      - key: MYSQL_ROOT_PASSWORD
        sync: false

  - type: web
    name: eureka-server
    runtime: docker
    dockerfilePath: Dockerfile
    rootDir: eureka-server
    plan: free
    envVars:
      - key: JAVA_TOOL_OPTIONS
        value: -Xms256m -Xmx400m
      - key: SERVER_PORT
        value: "8761"

  - type: web
    name: gateway-service
    runtime: docker
    dockerfilePath: Dockerfile
    rootDir: gateway-service
    plan: free
    envVars:
      - key: JAVA_TOOL_OPTIONS
        value: -Xms256m -Xmx400m
      - key: JWT_SECRET
        sync: false
      - key: EUREKA_URL
        fromService:
          name: eureka-server
          type: web
          property: host
          addPrefix: /eureka/
      - key: ALLOWED_ORIGINS
        value: https://cronos-restobar.vercel.app

  - type: web
    name: auth-service
    runtime: docker
    dockerfilePath: Dockerfile
    rootDir: auth-service
    plan: free
    envVars:
      - key: JAVA_TOOL_OPTIONS
        value: -Xms256m -Xmx400m
      - key: MYSQL_HOST
        fromService:
          name: cronos-mysql
          type: web
          property: host
      - key: MYSQL_PORT
        value: "3306"
      - key: MYSQL_USERNAME
        value: root
      - key: MYSQL_PASSWORD
        value: cronos2024
      - key: JWT_SECRET
        sync: false
      - key: EUREKA_URL
        fromService:
          name: eureka-server
          type: web
          property: host
          addPrefix: /eureka/
      - key: ALLOWED_ORIGINS
        value: https://cronos-restobar.vercel.app

