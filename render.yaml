services:
  - type: web
    name: eureka-server
    runtime: docker
    dockerfilePath: eureka-server/Dockerfile
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: JAVA_TOOL_OPTIONS
        value: -Xms256m -Xmx512m
      - key: SERVER_PORT
        value: "8761"

  - type: web
    name: gateway-service
    runtime: docker
    dockerfilePath: gateway-service/Dockerfile
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: JAVA_TOOL_OPTIONS
        value: -Xms256m -Xmx512m
      - key: JWT_SECRET
        sync: false
      - key: EUREKA_URL
        fromService:
          name: eureka-server
          type: web
          property: host
          addPrefix: /eureka/
      - key: ALLOWED_ORIGINS
        value: https://cronos-restobar.vercel.app

