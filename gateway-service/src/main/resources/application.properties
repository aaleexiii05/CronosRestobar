spring.application.name=gateway-service
server.port=${SERVER_PORT:8080}

jwt.secret=${JWT_SECRET:cronosRestobarSecretKey2024JWTTokenSeguroParaElProyecto}

# CORS
spring.cloud.gateway.globalcors.cors-configurations[/**].allowed-origins=${ALLOWED_ORIGINS:http://localhost:4200}
spring.cloud.gateway.globalcors.cors-configurations[/**].allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations[/**].allow-credentials=true

eureka.client.serviceUrl.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
