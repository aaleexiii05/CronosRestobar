spring.application.name=reservation-service
server.port=${SERVER_PORT:8086}

spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/reservation_db?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_USERNAME:root}
spring.datasource.password=${MYSQL_PASSWORD:254123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Lima

springdoc.swagger-ui.path=/swagger-ui
springdoc.api-docs.path=/v3/api-docs

eureka.client.serviceUrl.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}

menu.service.url=http://menu-service
auth.service.url=http://auth-service
order.service.url=http://order-service
billing.service.url=http://billing-service
consulta.service.url=http://consulta-service
notification.service.url=http://notification-service
