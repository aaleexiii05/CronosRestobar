spring.application.name=billing-service
server.port=${SERVER_PORT:8084}

spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/billing_db?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_USERNAME:root}
spring.datasource.password=${MYSQL_PASSWORD:254123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Lima

springdoc.swagger-ui.path=/swagger-ui
springdoc.api-docs.path=/v3/api-docs

eureka.client.serviceUrl.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}

order.service.url=http://order-service
auth.service.url=http://auth-service
consulta.service.url=http://consulta-service

mercadopago.access.token=${MP_ACCESS_TOKEN:APP_USR-503297240147848-062220-e067bc34bbe0aba5d411b8416c8fa673-3490313153}
mercadopago.back-urls.success=${MP_BACK_URL_SUCCESS:http://localhost:4200/cliente}
mercadopago.back-urls.failure=${MP_BACK_URL_FAILURE:http://localhost:4200/checkout}
mercadopago.webhook-url=${MP_WEBHOOK_URL:http://localhost:8080/api/facturas/webhook}
